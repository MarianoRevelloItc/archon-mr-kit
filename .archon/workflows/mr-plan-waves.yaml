name: mr-plan-waves
description: |
  Use when: User has N GitHub issues and wants to know in what order/grouping
            to implement them safely (avoiding merge conflicts when batching).
  Triggers: "plan waves", "mr plan waves", "wave plan", "batch plan",
            "analyze issues for batch", "mr-plan-waves".
  NOT for: Implementing the issues (use mr-issue-to-pr or mr-issue-to-pr-ralph),
           creating PRs, modifying code in any way.

  READ-ONLY workflow. Does NOT touch code, NOT create PRs, NOT spawn child workflows.
  Just analyzes and outputs:
    1. A wave plan (which issues go together, parallel vs sequential)
    2. TWO bash scripts in /tmp/mr-plan-{timestamp}/:
       - run-sequential.sh   (all issues one-by-one, safest)
       - run-parallel.sh     (follows the plan: parallel where safe, sequential where overlap)
    3. On-screen explanation of which one to use, with copy-pasteable launch commands

  Use cases:
  - Brownfield with many open issues: "tell me the safe batch order"
  - Post-PRD-split: "before I batch these, tell me which can go in parallel"
  - Risk-averse: "I want to know what touches what before I commit to batching"

  Examples:
    archon workflow run mr-plan-waves --branch plan/feb "Plan #2 #4 #5 #7 #10 #11"
    archon workflow run mr-plan-waves --branch plan/sprint3 "Analyze 4 5 7 8 10"

provider: claude
model: sonnet

nodes:
  # ═══════════════════════════════════════════════════════════════
  # PHASE 1: PARSE INPUT — Extract issue numbers from message
  # ═══════════════════════════════════════════════════════════════

  - id: parse-input
    bash: |
      set -e
      # Extract all issue numbers from $ARGUMENTS (comma, space, or hash separated)
      NUMBERS=$(echo "$ARGUMENTS" | grep -oE '[0-9]+' | sort -un | tr '\n' ' ' | sed 's/ $//')

      if [ -z "$NUMBERS" ]; then
        echo "ERROR: no issue numbers in message: $ARGUMENTS" >&2
        exit 1
      fi

      COUNT=$(echo "$NUMBERS" | wc -w | tr -d ' ')
      echo "Parsed $COUNT issue numbers: $NUMBERS"

      # Persist for downstream nodes
      echo "$NUMBERS" | tr ' ' ',' > "$ARTIFACTS_DIR/.issue-numbers.txt"
    timeout: 10000

  # ═══════════════════════════════════════════════════════════════
  # PHASE 2: ANALYZE — Predict files, build overlap matrix, group into waves
  # (read-only, uses gh + grep, no code changes)
  # ═══════════════════════════════════════════════════════════════

  - id: analyze-overlap
    command: mr-analyze-issue-overlap
    depends_on: [parse-input]
    context: fresh
    idle_timeout: 600000

  # ═══════════════════════════════════════════════════════════════
  # PHASE 3: GENERATE SCRIPTS — Write run-sequential.sh + run-parallel.sh
  # ═══════════════════════════════════════════════════════════════

  - id: generate-scripts
    bash: |
      set -e
      ANALYSIS="$ARTIFACTS_DIR/.overlap-analysis.json"
      if [ ! -f "$ANALYSIS" ]; then
        echo "ERROR: $ANALYSIS missing — analyze-overlap step did not produce output" >&2
        exit 1
      fi

      TIMESTAMP=$(date +%Y-%m-%d-%H-%M-%S)
      OUT_DIR="/tmp/mr-plan-$TIMESTAMP"
      mkdir -p "$OUT_DIR"
      echo "$OUT_DIR" > "$ARTIFACTS_DIR/.out-dir"

      REPO_ROOT="$(git rev-parse --show-toplevel)"

      export ANALYSIS REPO_ROOT OUT_DIR

      python3 -c '
      import json, os, stat

      analysis_path = os.environ["ANALYSIS"]
      repo_root = os.environ["REPO_ROOT"]
      out_dir = os.environ["OUT_DIR"]

      with open(analysis_path) as f:
          data = json.load(f)

      waves = data.get("waves", [])
      if not waves:
          print("WARN: no waves in analysis — nothing to generate")
          raise SystemExit(0)

      # ─── Generate run-sequential.sh ──────────────────────────────
      seq_lines = [
          "#!/bin/bash",
          f"# Generated by mr-plan-waves on {data.get(\"generated_at\", \"\")}",
          f"# MODE: SEQUENTIAL (safest, no parallelism, ~N x 45min)",
          f"# Plan: {data[\"total_issues\"]} issues",
          "",
          f"cd {repo_root!r}",
          "mkdir -p /tmp/mr-batch-logs",
          "",
          "echo \"[$(date +%H:%M:%S)] Starting SEQUENTIAL batch ($((" + str(data["total_issues"]) + " * 45)) min estimated)\"",
          "",
      ]
      for wave in waves:
          seq_lines.append(f"# ─── Wave {wave[\"id\"]} (sequential override of plan recommendation) ───")
          for n in wave["issues"]:
              seq_lines.append(f"echo \"[$(date +%H:%M:%S)] Starting #{n}...\"")
              seq_lines.append(
                  f"archon workflow run mr-issue-to-pr-ralph --branch \"fix/issue-{n}\" \"Fix issue #{n}\" "
                  f"> /tmp/mr-batch-logs/issue-{n}.log 2>&1"
              )
              seq_lines.append("")

      seq_lines.append("echo \"\"")
      seq_lines.append("echo \"════════════════════════════════════════\"")
      seq_lines.append("echo \"ALL DONE [$(date +%H:%M:%S)]\"")
      seq_lines.append("echo \"════════════════════════════════════════\"")
      seq_lines.append("gh pr list --state all --search \"head:fix/issue-\" --json number,title,state \\")
      seq_lines.append("  --jq \".[] | \\\"  PR #\\(.number) [\\(.state)] \\(.title)\\\"\"")

      seq_path = os.path.join(out_dir, "run-sequential.sh")
      with open(seq_path, "w") as f:
          f.write("\n".join(seq_lines) + "\n")
      os.chmod(seq_path, stat.S_IRWXU | stat.S_IRGRP | stat.S_IROTH)
      print(f"Wrote: {seq_path}")

      # ─── Generate run-parallel.sh (follows plan recommendations) ──
      par_lines = [
          "#!/bin/bash",
          f"# Generated by mr-plan-waves on {data.get(\"generated_at\", \"\")}",
          f"# MODE: PARALLEL (follows plan recommendations per wave)",
          f"# Plan: {data[\"total_issues\"]} issues across {len(waves)} waves",
          "",
          f"cd {repo_root!r}",
          "mkdir -p /tmp/mr-batch-logs",
          "",
          "wait_for_pattern() {",
          "  local pattern=$1; local label=$2",
          "  echo \"[$(date +%H:%M:%S)] Waiting for $label to finish...\"",
          "  while pgrep -f \"archon workflow run mr-issue-to-pr-ralph.*$pattern\" > /dev/null 2>&1; do",
          "    sleep 60",
          "  done",
          "  echo \"[$(date +%H:%M:%S)] $label done\"",
          "}",
          "",
      ]
      for wave in waves:
          mode = wave["mode"]
          issues = wave["issues"]
          reason = wave.get("reason", "")
          par_lines.append(f"# ─── Wave {wave[\"id\"]} ({mode}) — {reason} ───")
          par_lines.append(f"echo \"[$(date +%H:%M:%S)] Wave {wave[\"id\"]}: {len(issues)} issues ({mode})\"")
          if mode == "parallel" and len(issues) > 1:
              for n in issues:
                  par_lines.append(
                      f"nohup env -u CLAUDECODE archon workflow run mr-issue-to-pr-ralph "
                      f"--branch \"fix/issue-{n}\" \"Fix issue #{n}\" "
                      f"> /tmp/mr-batch-logs/issue-{n}.log 2>&1 &"
                  )
                  par_lines.append("disown $! 2>/dev/null || true")
                  par_lines.append("sleep 5")
              issue_pattern = "fix/issue-(" + "|".join(str(n) for n in issues) + ")"
              par_lines.append(f"wait_for_pattern \"{issue_pattern}\" \"Wave {wave[\"id\"]}\"")
          else:
              # Sequential (1 issue or sequential mode)
              for n in issues:
                  par_lines.append(f"echo \"  starting #{n}...\"")
                  par_lines.append(
                      f"archon workflow run mr-issue-to-pr-ralph --branch \"fix/issue-{n}\" \"Fix issue #{n}\" "
                      f"> /tmp/mr-batch-logs/issue-{n}.log 2>&1"
                  )
          par_lines.append("")

      par_lines.append("echo \"\"")
      par_lines.append("echo \"════════════════════════════════════════\"")
      par_lines.append("echo \"ALL DONE [$(date +%H:%M:%S)]\"")
      par_lines.append("echo \"════════════════════════════════════════\"")
      par_lines.append("gh pr list --state all --search \"head:fix/issue-\" --json number,title,state \\")
      par_lines.append("  --jq \".[] | \\\"  PR #\\(.number) [\\(.state)] \\(.title)\\\"\"")
      par_lines.append("echo \"\"")
      par_lines.append("echo \"needs-human-review (require manual attention):\"")
      par_lines.append("gh issue list --label needs-human-review --state open --json number,title \\")
      par_lines.append("  --jq \".[] | \\\"  #\\(.number): \\(.title)\\\"\"")

      par_path = os.path.join(out_dir, "run-parallel.sh")
      with open(par_path, "w") as f:
          f.write("\n".join(par_lines) + "\n")
      os.chmod(par_path, stat.S_IRWXU | stat.S_IRGRP | stat.S_IROTH)
      print(f"Wrote: {par_path}")
      '
    depends_on: [analyze-overlap]
    timeout: 60000

  # ═══════════════════════════════════════════════════════════════
  # PHASE 4: PRESENT — Display the plan + scripts location + usage
  # ═══════════════════════════════════════════════════════════════

  - id: present-plan
    prompt: |
      You are presenting a wave plan analysis result to the user.

      ## Inputs

      Read these artifacts:
      - `$ARTIFACTS_DIR/.overlap-analysis.json` — the full analysis
      - `$ARTIFACTS_DIR/.out-dir` — path to /tmp/mr-plan-{timestamp}/

      ```bash
      cat $ARTIFACTS_DIR/.overlap-analysis.json
      cat $ARTIFACTS_DIR/.out-dir
      ```

      ## Output format (paste this verbatim, filled in)

      ```
      ═══════════════════════════════════════════════════════════
      WAVE PLAN — {N} issues analyzed
      ═══════════════════════════════════════════════════════════

      📊 ANALYSIS

        Hub files (touched by 2+ issues):
          - {file}: touched by {issue_numbers}
          - ...

        Independent issues: {count}
        With internal overlap: {count}
        Skipped: {count} ({reasons})

      🌊 WAVES (recommendation)

        WAVE 1 ({N} issues) — {mode} {reason}:
          - #{n} {title}
          - ...
        WAVE 2 ({N} issues) — {mode} {reason}:
          - #{n} {title}
          - ...

      ═══════════════════════════════════════════════════════════
      📁 SCRIPTS GENERATED
      ═══════════════════════════════════════════════════════════

        {OUT_DIR}/
          ├── run-sequential.sh   ← MODO SEGURO
          │   → Todos los issues uno tras otro, sin paralelismo
          │   → Tiempo estimado: ~{N} issues × 45min = ~{total}h
          │   → Riesgo: cero conflicts (cada hijo arranca contra main fresco)
          │   → Recomendado si NO confiás en el análisis del plan
          │
          └── run-parallel.sh     ← MODO RÁPIDO (sigue el plan)
              → Wave por wave: paralelo donde safe, secuencial donde overlap
              → Tiempo estimado: ~{calculated}h (más rápido)
              → Riesgo: bajo (el plan ya identificó dónde es safe paralelo)
              → Recomendado si confiás en el análisis del plan

      ═══════════════════════════════════════════════════════════
      🚀 PARA EJECUTAR
      ═══════════════════════════════════════════════════════════

      # Modo A — seguro (sin paralelismo)
      bash {OUT_DIR}/run-sequential.sh

      # Modo B — siguiendo recomendación del plan
      bash {OUT_DIR}/run-parallel.sh

      # Para AFK total (recomendado), agregá nohup en cualquier opción:

      # AFK seguro
      nohup bash {OUT_DIR}/run-sequential.sh \
        > /tmp/wave-batch.log 2>&1 &
      disown $!

      # AFK siguiendo plan
      nohup bash {OUT_DIR}/run-parallel.sh \
        > /tmp/wave-batch.log 2>&1 &
      disown $!

      ═══════════════════════════════════════════════════════════
      💡 USAGE TIPS
      ═══════════════════════════════════════════════════════════

      1. Cada hijo intenta auto-merge si: validate verde + 0 CRITICAL pendientes + rebase OK.
      2. Los que NO cumplen el threshold quedan abiertos con label `needs-human-review`.
      3. Revisá esos al volver con: gh pr list --label needs-human-review --state open
      4. El log del batch (si usaste nohup): tail -f /tmp/wave-batch.log

      ═══════════════════════════════════════════════════════════
      ```

      Substitute all `{placeholders}` with actual data from the analysis JSON.
      Calculate "total" time as: total_issues × 45 / 60 (hours).
      Calculate parallel time as: sum of (max issue per wave) × 45 / 60.
    depends_on: [generate-scripts]
    context: fresh
    allowed_tools: [Read, Bash]
